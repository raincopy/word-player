<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Word Player Final</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="eyebrow">AI 영어 단어 학습방</div>
      <h1>뜻 말고 구조로 보는 영어</h1>
    </header>

    <section class="category-panel">
      <div id="categoryButtons" class="category-buttons"></div>
    </section>

    <section id="wordListPanel" class="word-list-panel hidden">
      <div id="wordButtons" class="word-buttons"></div>
    </section>

    <section id="playerPanel" class="player-panel hidden">
      <div class="player-top">
        <button id="backHomeBtn" type="button">← 목록</button>
        <div id="currentWordTitle" class="current-word"></div>
        <div id="cardCounter" class="card-counter"></div>
      </div>
      <div class="card-stage"><img id="cardImage" alt="word-card" /></div>
      <div class="card-controls">
        <button id="prevCardBtn" type="button">이전</button>
        <button id="nextCardBtn" type="button">다음</button>
      </div>
    </section>
  </main>
  <script src="./app.js?v=final_verify_1"></script>
</body>
</html>
